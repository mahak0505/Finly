{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses — Finly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/shared.css' %}">
<style>
.exp-list-container { background: var(--white-04); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 1.5rem; margin-top: 1rem; }
.exp-hdr-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px; gap: 1rem; padding: 10px; border-bottom: 1px solid var(--border-subtle); color: var(--text-muted); font-size: .75rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.exp-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 80px; gap: 1rem; padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; transition: all .2s; border-radius: 8px;}
.exp-row:hover { background: var(--white-04); }
.exp-row:last-child { border-bottom: none; }
.exp-name { font-weight: 500; color: var(--white); display: flex; align-items: center; gap: 10px; }
.exp-ico { width: 32px; height: 32px; background: rgba(255,255,255,.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.exp-del { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); border-radius: 6px; padding: 5px 10px; font-size: .7rem; cursor: pointer; transition: all .2s; }
.exp-del:hover { background: rgba(248,113,113,0.2); }
</style>
</head>
<body>

<!-- TOP BAR -->
 {% include 'sidebar.html' with active_page='expenses' %}

<div class="app-layout">
 
  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="page-hdr">
      <div>
        <div class="pg-title">Expenses 💳</div>
        <div class="pg-sub">Manage and track your transaction history</div>
      </div>
      <button class="btn-primary" style="width:auto; padding: 8px 16px;" onclick="openModal('addExpModal')">+ Add Expense</button>
    </div>

    <!-- Stats -->
    <div class="stat-row" style="grid-template-columns: repeat(3, 1fr);">
      <div class="stat-card">
        <div class="stat-lbl">Total Expenses</div>
        <div class="stat-val" id="stat-total">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Top Category</div>
        <div class="stat-val" id="stat-topcat" style="font-size: 1.2rem; transform: translateY(4px);">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Monthly Average</div>
        <div class="stat-val" id="stat-avg">₹0</div>
      </div>
    </div>

    <div class="exp-list-container">
      <div class="exp-hdr-row">
        <div>Description</div>
        <div>Category</div>
        <div>Date</div>
        <div>Amount</div>
        <div>Action</div>
      </div>
      <div id="fullTxnList">
        <!-- Rendered by JS -->
      </div>
    </div>

  </main>
</div>

<!-- Add Expense Modal -->
<div class="modal-overlay" id="addExpModal" onclick="closeModals()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-title">New Expense</div>
      <button class="modal-close" onclick="closeModals()">×</button>
    </div>
    <div class="frm-grp">
      <label class="frm-lbl">Description</label>
      <input type="text" class="frm-inp" id="aeDesc" placeholder="e.g. Swiggy Order">
    </div>
    <div class="frm-grp">
      <label class="frm-lbl">Category</label>
      <select class="frm-inp" id="aeCat" style="color:var(--blue-deep)">
        <option>Food</option><option>Travel</option><option>Books</option><option>Accommodation</option><option>Health</option><option>Fun</option><option>Other</option>
      </select>
    </div>
    <div class="frm-grp">
      <label class="frm-lbl">Amount (₹)</label>
      <input type="number" class="frm-inp" id="aeAmt" placeholder="e.g. 350">
    </div>
    <button class="btn-primary" onclick="saveNewExpense()">Add Expense</button>
  </div>
</div>
  <script src="{% static 'js/store.js' %}"></script>  
<script>
function renderExpenses() {
  const exps = Store.get('expenses');
  
  // Stats
  const total = exps.reduce((acc, curr) => acc + curr.amt, 0);
  document.getElementById('stat-total').textContent = Store.formatMoney(total);
  document.getElementById('stat-avg').textContent = Store.formatMoney(Math.round(total / (new Date().getDate() || 1)));
  
  const catTotals = {};
  exps.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amt; });
  const topCat = Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a])[0] || '-';
  document.getElementById('stat-topcat').textContent = topCat;

  // List
  const listEl = document.getElementById('fullTxnList');
  let html = '';
  exps.forEach(e => {
    let ico = '💸'; 
    if(e.cat==='Food') ico='🍔'; if(e.cat==='Travel') ico='🚌'; if(e.cat==='Books') ico='📚'; if(e.cat==='Health') ico='🏥'; if(e.cat==='Fun') ico='🎮'; if(e.cat==='Accommodation') ico='🏠';
    const d = new Date(e.date).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
    html += `
      <div class="exp-row">
        <div class="exp-name"><div class="exp-ico">${ico}</div><span>${e.name || 'Unnamed'}</span></div>
        <div style="font-size:.8rem; color:var(--text-sub);">${e.cat}</div>
        <div style="font-size:.8rem; color:var(--text-sub);">${d}</div>
        <div style="font-weight:600; font-family:'Sora',sans-serif;">₹${e.amt}</div>
        <div><button class="exp-del" onclick="deleteExpense('${e.id}')">Delete</button></div>
      </div>
    `;
  });
  listEl.innerHTML = html || '<div class="no-data">No expenses recorded yet.</div>';
}

function deleteExpense(id) {
  let exps = Store.get('expenses');
  exps = exps.filter(e => e.id !== id);
  Store.set('expenses', exps);
  renderExpenses();
}

function saveNewExpense() {
  const desc = document.getElementById('aeDesc').value;
  const cat = document.getElementById('aeCat').value;
  const amt = document.getElementById('aeAmt').value;
  if(!desc || !amt) return alert('Please enter description and amount');
  
  Store.addExpense(desc, cat, amt, '');
  closeModals();
  document.getElementById('aeDesc').value = '';
  document.getElementById('aeAmt').value = '';
  renderExpenses();
}

document.addEventListener('DOMContentLoaded', renderExpenses);
</script>
</body>
</html>
